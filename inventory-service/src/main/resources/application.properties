# ===============================
# APPLICATION CONFIG
# ===============================
spring.application.name=inventory-service
server.port=8084

# ===============================
# CASSANDRA CONFIG (FINAL ✅)
# ===============================
spring.cassandra.keyspace-name=ecommerce
spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.schema-action=none

# ===============================
# KAFKA CONFIG
# ===============================
spring.kafka.bootstrap-servers=localhost:9092

spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.ecommerce.inventoryservice.dto.OrderCreatedEvent

# 🔥 CRITICAL FIX (correct spelling)
spring.kafka.consumer.properties.spring.json.use.type.headers=false